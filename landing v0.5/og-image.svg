<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="oklch(0.985 0.002 270)" />
      <stop offset="100%" stop-color="oklch(0.93 0.02 257)" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(15,17,21,0.05)" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="14" fill="oklch(0.58 0.18 257)" />
    <path d="M20 46V18L44 46V18" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  <text x="164" y="128" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="oklch(0.18 0.005 270)">Nexus</text>

  <!-- Headline -->
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="700" fill="oklch(0.18 0.005 270)">
    Your inbox is a database.
  </text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="700" fill="oklch(0.58 0.18 257)">
    Start treating it like one.
  </text>

  <!-- Subhead -->
  <text x="80" y="450" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="oklch(0.38 0.005 270)">
    Local-first email with Airtable-grade metadata, kanban, and zero-knowledge sync.
  </text>

  <!-- Footer badges -->
  <g transform="translate(80, 540)" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="oklch(0.38 0.005 270)">
    <text x="0" y="0">Local-first</text>
    <text x="160" y="0">·</text>
    <text x="180" y="0">E2EE sync</text>
    <text x="340" y="0">·</text>
    <text x="360" y="0">Open source</text>
    <text x="540" y="0">·</text>
    <text x="560" y="0">macOS native</text>
  </g>
</svg>
