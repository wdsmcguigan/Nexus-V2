name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      # NOTE: src/storage/__tests__/ep3.test.ts "FTS prefix search" is a known
      # pre-existing failure unrelated to any calendar work. Until it is fixed
      # separately, this step (and only this step) will be red.
      - run: pnpm test

  rust:
    name: Rust (check · test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            relay-server
      - name: cargo check — nexus (Tauri backend)
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets
      - name: cargo test — nexus (Tauri backend)
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: cargo check — nexus-relay
        run: cargo check --manifest-path relay-server/Cargo.toml --all-targets
      - name: cargo test — nexus-relay
        run: cargo test --manifest-path relay-server/Cargo.toml
