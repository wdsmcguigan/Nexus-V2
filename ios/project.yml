name: Nexus
options:
  bundleIdPrefix: com.nexus
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"

packages:
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.0.0"
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: "3.0.0"

targets:
  Nexus:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Nexus
        excludes:
          - "**/*.md"
    resources:
      - path: Nexus/Data/Schema.sql
    info:
      path: Nexus/App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        NEXUS_GMAIL_CLIENT_ID: ""
        NEXUS_GMAIL_CLIENT_SECRET: ""
        # Ensure Info.plist is not re-generated by Xcode
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Nexus/App/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - package: GRDB.swift
        product: GRDB
      - package: swift-crypto
        product: Crypto
      - package: swift-crypto
        product: _CryptoExtras

  NexusTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - NexusTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.app.tests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Nexus
      - package: GRDB.swift
        product: GRDB
      - package: swift-crypto
        product: Crypto
      - package: swift-crypto
        product: _CryptoExtras

schemes:
  Nexus:
    build:
      targets:
        Nexus: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NexusTests
